#ytdl_preload.conf
# make sure lines do not have trailing whitespace
# ytdl_opt has no sanity check and should be formatted exactly how it would appear in yt-dlp CLI, they are split into a key/value pair on whitespace
# at least on Windows, do not escape '\' in temp, just us a single one for each divider
# keep_faults=false :: if ytdl fails to retrieve a video, "true" will keep it in the playlist, if set to "false" the entry is removed so that the script can preload the next video instead
# first temp path example is for linux users, the second one is an example for windows

#temp=\tmp\ytdl
#temp=C:\tmp\ytdl

#keep_faults=false
#ytdl_opt1=-N 5
#ytdl_opt2=--sub-langs en.*
